name: Update game data

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Record current howbazaar versions
        id: before
        run: |
          echo "items=$(jq -r '.version // empty' data/raw/items.json 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "skills=$(jq -r '.version // empty' data/raw/skills.json 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - run: yarn install --frozen-lockfile
      - run: yarn update-data

      - name: Skip if howbazaar data unchanged
        id: changed
        run: |
          NEW_ITEMS=$(jq -r '.version' data/raw/items.json)
          NEW_SKILLS=$(jq -r '.version' data/raw/skills.json)
          if [ "${{ steps.before.outputs.items }}" = "$NEW_ITEMS" ] && [ "${{ steps.before.outputs.skills }}" = "$NEW_SKILLS" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "howbazaar versions unchanged ($NEW_ITEMS / $NEW_SKILLS)"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "howbazaar updated: items ${{ steps.before.outputs.items }} → $NEW_ITEMS, skills ${{ steps.before.outputs.skills }} → $NEW_SKILLS"
          fi

      - name: Fill missing sell price stubs
        if: steps.changed.outputs.changed == 'true'
        run: node scripts/fillMissingOverrides.mjs

      - name: Validate and build
        if: steps.changed.outputs.changed == 'true'
        run: |
          yarn check-data
          yarn build

      - name: Commit and push
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw src/data/*.json src/data/sellPriceOverrides.ts
          if git diff --staged --quiet; then
            echo "No file changes to commit"
          else
            git commit -m "$(cat <<'EOF'
chore: refresh item/skill data from howbazaar.gg

EOF
)"
            git push
          fi
